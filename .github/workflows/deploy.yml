name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Remove the setup-node step entirely to avoid forcing Node.js 20

      - name: Install Security Tools
        run: |
          # Install Trivy
          wget https://github.com/aquasecurity/trivy/releases/download/v0.49.1/trivy_0.49.1_Linux-64bit.deb
          sudo dpkg -i trivy_0.49.1_Linux-64bit.deb
          
          # Install Syft
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          
          # Verify installations
          trivy --version
          syft --version

      - name: Gitleaks (Secrets)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true # This must be explicitly set to true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (SAST)
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep --config=p/python --config=p/secrets --error .

      - name: Hadolint (Dockerfile lint)
        continue-on-error: true
        run: |
          if [ -f "securedock-platform/docker/Dockerfile.backend" ]; then
            docker run --rm -v $(pwd):/workspace hadolint/hadolint:latest /workspace/securedock-platform/docker/Dockerfile.backend
          else
            echo "Dockerfile.backend not found, skipping lint"
          fi
          
          if [ -f "securedock-platform/docker/Dockerfile.frontend" ]; then
            docker run --rm -v $(pwd):/workspace hadolint/hadolint:latest /workspace/securedock-platform/docker/Dockerfile.frontend
          else
            echo "Dockerfile.frontend not found, skipping lint"
          fi

      - name: Build Backend and Trivy Scan
        continue-on-error: true
        id: trivy-backend
        run: |
          if [ -f "securedock-platform/docker/Dockerfile.backend" ]; then
            docker build -f securedock-platform/docker/Dockerfile.backend -t securedock-backend:test securedock-platform/
            trivy image --severity CRITICAL,HIGH --exit-code 1 securedock-backend:test
          else
            echo "Dockerfile.backend not found, skipping backend scan"
          fi

      - name: Build Frontend and Trivy Scan
        continue-on-error: true
        id: trivy-frontend
        run: |
          if [ -f "securedock-platform/docker/Dockerfile.frontend" ]; then
            docker build -f securedock-platform/docker/Dockerfile.frontend -t securedock-frontend:test securedock-platform/
            trivy image --severity CRITICAL,HIGH --exit-code 1 securedock-frontend:test
          else
            echo "Dockerfile.frontend not found, skipping frontend scan"
          fi

      - name: Generate SBOM with Syft
        continue-on-error: true
        run: |
          if docker image inspect securedock-backend:test > /dev/null 2>&1; then
            syft securedock-backend:test -o json > sbom-backend.json
            echo "✅ SBOM generated for backend"
          else
            echo "⚠️ Backend image not found, skipping SBOM"
          fi
          
          if docker image inspect securedock-frontend:test > /dev/null 2>&1; then
            syft securedock-frontend:test -o json > sbom-frontend.json
            echo "✅ SBOM generated for frontend"
          else
            echo "⚠️ Frontend image not found, skipping SBOM"
          fi

      - name: List generated files for debugging
        run: |
          echo "Generated files in current directory:"
          ls -la ./*.json 2>/dev/null || echo "No JSON files found"

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        if: always() && (success() || failure())
        with:
          name: sbom
          path: |
            sbom-backend.json
            sbom-frontend.json
          # This will not fail the step if the files are missing.

      - name: Security Scan Summary
        if: always()
        run: |
          echo "📊 Security Scan Results:"
          echo "Gitleaks (Secrets): Completed with ${{ job.status }}"
          echo "Semgrep (SAST): Completed with ${{ job.status }}"
          echo "Hadolint (Docker): Completed"
          echo "Trivy Backend: ${{ steps.trivy-backend.outcome }}"
          echo "Trivy Frontend: ${{ steps.trivy-frontend.outcome }}"

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    # Deploy only if the security-scan job didn't fail critically
    if: always() && needs.security-scan.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Get EC2 IP from Terraform output
        run: |
          cd terraform
          terraform init
          IP=$(terraform output -raw ec2_public_ip)
          echo "EC2_HOST=$IP" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/securedock-platform || git clone https://github.com/${{ github.repository }}.git
            cd ~/securedock-platform
            git pull
            docker compose -f compose/docker-compose.yml down
            docker compose -f compose/docker-compose.yml up -d --build