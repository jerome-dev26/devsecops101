name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: actions/checkout@v4

      - name: Install Security Tools
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          # Install Syft
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Gitleaks (Secrets)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (SAST)
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep --config=p/python --config=p/secrets --error .

      - name: Hadolint (Dockerfile lint)
        continue-on-error: true
        run: |
          docker run --rm -v $(pwd):/workspace hadolint/hadolint:latest /workspace/securedock-platform/docker/Dockerfile.backend

      - name: Build Backend and Trivy Scan
        continue-on-error: true
        id: trivy-backend
        run: |
          cd securedock-platform
          docker build -f docker/Dockerfile.backend -t securedock-backend:test .
          trivy image --severity CRITICAL,HIGH --exit-code 1 securedock-backend:test

      - name: Build Frontend and Trivy Scan
        continue-on-error: true
        id: trivy-frontend
        run: |
          cd securedock-platform
          docker build -f docker/Dockerfile.frontend -t securedock-frontend:test .
          trivy image --severity CRITICAL,HIGH --exit-code 1 securedock-frontend:test

      - name: Generate SBOM with Syft
        continue-on-error: true
        run: |
          cd securedock-platform
          syft securedock-backend:test -o json > sbom-backend.json
          syft securedock-frontend:test -o json > sbom-frontend.json
      
      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: |
            securedock-platform/sbom-backend.json
            securedock-platform/sbom-frontend.json

      - name: Security Scan Summary
        if: always()
        run: |
          echo "📊 Security Scan Results:"
          echo "✅ Gitleaks (Secrets): Completed"
          echo "✅ Semgrep (SAST): Completed"
          echo "✅ Hadolint (Docker): Completed"
          echo "✅ Trivy Backend: ${{ steps.trivy-backend.outcome }}"
          echo "✅ Trivy Frontend: ${{ steps.trivy-frontend.outcome }}"
          echo "✅ SBOM Generated: Completed"

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    if: always() && needs.security-scan.result != 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Get EC2 IP from Terraform output
        run: |
          cd terraform
          terraform init
          IP=$(terraform output -raw ec2_public_ip)
          echo "EC2_HOST=$IP" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/securedock-platform || git clone https://github.com/${{ github.repository }}.git
            cd ~/securedock-platform
            git pull
            docker compose -f compose/docker-compose.yml down
            docker compose -f compose/docker-compose.yml up -d --build