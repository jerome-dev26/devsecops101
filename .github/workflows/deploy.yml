name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks (Secrets)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (SAST)
        run: |
          pip install semgrep
          semgrep --config=p/python --config=p/secrets --error .

      - name: Hadolint (Dockerfile lint)
        run: |
          docker run --rm -v $(pwd):/workspace hadolint/hadolint:latest /workspace/docker/Dockerfile.backend

      - name: Build and Trivy Scan
        run: |
          docker build -f docker/Dockerfile.backend -t securedock-backend:test .
          trivy image --severity CRITICAL,HIGH --exit-code 1 securedock-backend:test

      - name: Generate SBOM with Syft
        run: |
          syft securedock-backend:test -o json > sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  deploy:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Get EC2 IP from Terraform output (requires AWS creds)
        run: |
          cd terraform
          terraform init
          IP=$(terraform output -raw ec2_public_ip)
          echo "EC2_HOST=$IP" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/securedock-platform || git clone https://github.com/${{ github.repository }}.git
            cd ~/securedock-platform
            git pull
            docker compose -f compose/docker-compose.yml down
            docker compose -f compose/docker-compose.yml up -d --build